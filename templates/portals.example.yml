# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# This customized example is tailored for entry- to mid-level design roles,
# especially game design, UX/UI, and digital/graphic design.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. WebSearch with site: filters (broad discovery for relevant design jobs)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # [CUSTOMIZE] Add keywords matching YOUR target roles
    - "Game Designer"
    - "Level Designer"
    - "Systems Designer"
    - "Narrative Designer"
    - "UX Designer"
    - "UI Designer"
    - "User Experience Designer"
    - "User Interface Designer"
    - "Interaction Designer"
    - "Product Designer"
    - "Visual Designer"
    - "Digital Designer"
    - "Graphic Designer"
    - "Experience Designer"
    - "Multimedia Designer"
    - "Creative Designer"
    - "Interactive Designer"
    - "Playable Systems Designer"
    - "Game Design Intern"
  negative:
    # [CUSTOMIZE] Add keywords for roles you do not want to match
    - "Intern"
    - "Software Engineer"
    - "Programmer"
    - "Developer"
    - "Machine Learning"
    - "AI"
    - "ML"
    - "DevOps"
    - "Infrastructure"
    - "Backend"
    - "Frontend"
    - "QA"
    - "Test"
    - "Data"
    - "Research Scientist"
    - "Salesforce"
    - "SAP"
    - "Oracle"
    - "Mainframe"
    - "COBOL"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Crypto"
    - "Web3"
  seniority_boost:
    - "Senior"
    - "Lead"
    - "Head"
    - "Principal"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
  - name: Wellfound — Game + UX Design
    query: 'site:wellfound.com "Game Designer" OR "Level Designer" OR "UX Designer" OR "UI Designer" OR "Product Designer" remote'
    enabled: true

  - name: Dribbble — Design Roles
    query: 'site:dribbble.com/jobs "UX Designer" OR "UI Designer" OR "Product Designer" OR "Visual Designer" remote'
    enabled: true

  - name: Behance — Creative Design
    query: 'site:behance.net/joblist "UX Designer" OR "UI Designer" OR "Digital Designer" OR "Graphic Designer" remote'
    enabled: true

  - name: Workable — Game + Design
    query: 'site:workable.com "Game Designer" OR "UX Designer" OR "Product Designer" "Interactive" remote'
    enabled: true

  - name: AngelList — Game / Design Startups
    query: 'site:angel.co "Game Designer" OR "UX Designer" OR "Product Designer" OR "Interaction Designer" remote'
    enabled: true

  - name: Indeed Canada — Toronto Design
    query: 'site:indeed.com "Game Designer" OR "UX Designer" OR "UI Designer" OR "Graphic Designer" Toronto OR Ontario'
    enabled: true

  - name: LinkedIn — Remote Design
    query: 'site:linkedin.com/jobs "Game Designer" OR "UX Designer" OR "Product Designer" OR "Digital Designer" remote'
    enabled: true

  - name: GameJobs.co — Game Design
    query: 'site:gamejobs.co "Game Designer" OR "Level Designer" OR "Narrative Designer" remote'
    enabled: true

  - name: Remote OK — Remote Design
    query: 'site:remoteok.com "UX Designer" OR "UI Designer" OR "Product Designer" OR "Digital Designer"'
    enabled: true

  - name: Remote.co — Remote UX / Design
    query: 'site:remote.co "UX Designer" OR "UI Designer" OR "Product Designer" OR "Creative Designer"'
    enabled: true

